<script>
const SAMPLE=`To connect your Salesforce account, navigate to the Sources section in the left sidebar and click Add Source. Search for Salesforce in the connector list. You will need your Consumer Key and Consumer Secret from your Salesforce Connected App. Enter these credentials and click Verify. Once verified, select the objects you want to sync. You can select multiple objects. Configure the pipeline frequency and click Save and Activate. The pipeline will begin syncing immediately.`;

const PERSONAS={
  confused:{name:'The Confused User',emoji:'😤',desc:'Has read it twice and is still lost',cardClass:'card-confused'},
  impatient:{name:'The Impatient User',emoji:'🏃',desc:'Skimmed it, missed things, annoyed',cardClass:'card-impatient'},
  skeptic:{name:'The Skeptical User',emoji:'🧐',desc:'Doesn\'t trust the doc, needs proof',cardClass:'card-skeptic'},
  newbie:{name:'The Total Newbie',emoji:'🐣',desc:'Doesn\'t know what half these words mean',cardClass:'card-newbie'},
};

function loadSample(){document.getElementById('docInput').value=SAMPLE}
function clearAll(){
  document.getElementById('docInput').value='';
  document.getElementById('questionsBody').innerHTML=`<div class="empty-state"><div class="empty-icon">🤔</div><div class="empty-text">Paste documentation and click Simulate User.</div></div>`;
  document.getElementById('scoreBar').style.display='none';
  document.getElementById('rightTitle').textContent='User Questions';
}

async function runSimulator(){
  const doc=document.getElementById('docInput').value.trim();
  if(!doc){alert('Paste some documentation first.');return}

  const persona=document.getElementById('persona').value;
  const mood=document.getElementById('mood').value;
  const doctype=document.getElementById('doctype').value;
  const expertise=document.getElementById('expertise').value;

  const btn=document.getElementById('runBtn');
  btn.classList.add('btn-loading');
  btn.textContent='⟳ Simulating...';

  document.getElementById('questionsBody').innerHTML=`<div class="loading-state"><div class="spinner"></div><div class="loading-msg">Actually reading your doc this time…</div></div>`;
  document.getElementById('scoreBar').style.display='none';

  const personaDesc=persona==='all'
    ?'Generate questions from 4 distinct users: confused, impatient, skeptical, and newbie.'
    :`Generate questions ONLY from: ${PERSONAS[persona]?.name}.`;

  const moodMap={
    mildly:'mildly irritated',
    very:'very confused and frustrated',
    polite:'politely frustrated',
    done:'completely done with this product'
  };

  const prompt=`You are simulating a real human user reading documentation.

User profile:
- Expertise: ${expertise}
- Doc type: ${doctype}
- Mood: ${moodMap[mood]}
${personaDesc}

CRITICAL RULES:
1. Every question MUST be triggered by a SPECIFIC phrase in the documentation
2. You MUST quote or paraphrase the exact part that caused confusion
3. DO NOT generate generic questions that could apply to any product
4. Each question must target a DIFFERENT part of the document
5. Avoid repeating the same confusion pattern
6. Make the tone human, slightly emotional, and natural

BAD QUESTIONS (DO NOT DO THIS):
- "Where do I find this?" (unless doc explicitly mentions it unclearly)
- "What does this mean?" (without referencing exact phrase)
- Anything generic

GOOD QUESTION STYLE:
"You say 'configure pipeline frequency' — configure how exactly? What options do I even have?"

For each question:
- persona: confused | impatient | skeptic | newbie
- question: natural human question referencing doc
- tag: gap | ambiguity | missing | prereq | jargon
- fix: 1-line improvement suggestion

DOCUMENT:
"""
${doc}
"""

Return ONLY valid JSON:
{
  "questions": [...],
  "clarity_score": number,
  "clarity_verdict": "one sharp sentence"
}`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        temperature:0.9,
        messages:[{role:'user',content:prompt}]
      })
    });

    const data=await response.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const parsed=JSON.parse(clean);

    renderQuestions(parsed,persona);

  }catch(err){
    console.error(err);
    renderFallback(doc,persona);
  }finally{
    btn.classList.remove('btn-loading');
    btn.textContent='😤 Simulate User';
  }
}

function renderQuestions(parsed,personaFilter){
  const questions=parsed.questions||[];
  const score=parsed.clarity_score||50;
  const verdict=parsed.clarity_verdict||'';

  const personasToShow=personaFilter==='all'?['confused','impatient','skeptic','newbie']:[personaFilter];

  let html='';
  const grouped={};
  questions.forEach(q=>{
    const p=q.persona||'confused';
    if(!grouped[p])grouped[p]=[];
    grouped[p].push(q);
  });

  personasToShow.forEach(pKey=>{
    const pInfo=PERSONAS[pKey];
    if(!pInfo)return;
    const pQuestions=grouped[pKey]||[];
    if(!pQuestions.length)return;

    html+=`<div class="q-user-header">
      <div class="user-avatar">${pInfo.emoji}</div>
      <div>
        <div class="user-name">${pInfo.name}</div>
        <div class="user-desc">${pInfo.desc}</div>
      </div>
    </div>`;

    pQuestions.forEach(q=>{
      html+=`<div class="question-card ${PERSONAS[pKey]?.cardClass}">
        <div class="q-text">"${q.question}"</div>
        <div class="q-meta"><span class="q-tag ${q.tag}">${q.tag}</span></div>
        <div class="q-suggestion"><strong>Fix →</strong> ${q.fix}</div>
      </div>`;
    });
  });

  document.getElementById('questionsBody').innerHTML=html;
  document.getElementById('rightTitle').textContent=`${questions.length} questions generated`;

  const scoreEl=document.getElementById('clarityScore');
  scoreEl.textContent=score+'%';
  scoreEl.className='clarity-score '+(score>=80?'score-good':score>=60?'score-ok':'score-bad');
  document.getElementById('clarityDesc').textContent=verdict;
  document.getElementById('scoreBar').style.display='flex';
}

function renderFallback(doc,personaFilter){
  const questions=[
    {
      persona:'confused',
      question:`You mention "${doc.slice(0,40)}..." — what exactly am I supposed to do here?`,
      tag:'ambiguity',
      fix:'Clarify this step with explicit instructions'
    }
  ];

  renderQuestions({
    questions,
    clarity_score:60,
    clarity_verdict:'Fallback mode — API failed'
  },personaFilter);
}
</script>
