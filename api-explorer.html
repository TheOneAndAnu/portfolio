<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Docs Explorer — Anubhuti Khare</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --green: #3fb950;
    --blue: #58a6ff; --orange: #f78166; --yellow: #e3b341;
    --purple: #bc8cff; --pink: #f778ba; --saffron: #f4720b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Bricolage Grotesque', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem;
  }
  .back { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  .back:hover { color: var(--saffron); }
  .tool-logo { font-size: 1.1rem; font-weight: 800; }
  .tool-logo span { color: var(--saffron); }
  .badge-live {
    background: rgba(63,185,80,0.15); color: var(--green);
    border: 1px solid rgba(63,185,80,0.3);
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 0.2rem 0.6rem; border-radius: 100px;
    font-family: 'DM Mono', monospace;
  }

  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 1.5rem 0;
  }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); padding: 0 1.2rem; margin-bottom: 0.5rem;
  }
  .endpoint-btn {
    display: flex; align-items: center; gap: 0.75rem;
    width: 100%; padding: 0.6rem 1.2rem;
    background: none; border: none; color: var(--text);
    font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.82rem;
    cursor: pointer; text-align: left; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .endpoint-btn:hover { background: rgba(255,255,255,0.04); }
  .endpoint-btn.active { background: rgba(244,114,11,0.1); border-left-color: var(--saffron); }
  .method-badge {
    font-family: 'DM Mono', monospace; font-size: 0.6rem; font-weight: 700;
    padding: 0.15rem 0.45rem; border-radius: 3px; min-width: 44px; text-align: center;
  }
  .get { background: rgba(63,185,80,0.2); color: var(--green); }
  .post { background: rgba(88,166,255,0.2); color: var(--blue); }
  .put { background: rgba(227,179,65,0.2); color: var(--yellow); }
  .delete { background: rgba(247,129,102,0.2); color: var(--orange); }
  .patch { background: rgba(188,140,255,0.2); color: var(--purple); }

  /* MAIN */
  .main { overflow-y: auto; padding: 2rem; }

  .endpoint-header { margin-bottom: 2rem; }
  .endpoint-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.4rem; }
  .endpoint-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; }
  .endpoint-url {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1rem;
    font-family: 'DM Mono', monospace; font-size: 0.88rem;
  }
  .endpoint-url .method-badge { font-size: 0.72rem; padding: 0.25rem 0.6rem; }
  .url-path { color: var(--blue); }

  .tabs-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab {
    padding: 0.6rem 1.2rem; background: none; border: none;
    color: var(--muted); font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 0.83rem; font-weight: 600; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--saffron); border-bottom-color: var(--saffron); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .params-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
  .params-table th {
    text-align: left; padding: 0.6rem 1rem;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .params-table td { padding: 0.75rem 1rem; font-size: 0.85rem; border-bottom: 1px solid rgba(48,54,61,0.5); vertical-align: top; }
  .param-name { font-family: 'DM Mono', monospace; color: var(--pink); }
  .param-type { font-family: 'DM Mono', monospace; color: var(--purple); font-size: 0.78rem; }
  .param-required { color: var(--orange); font-family: 'DM Mono', monospace; font-size: 0.7rem; }
  .param-desc { color: var(--muted); font-size: 0.82rem; }

  .try-it { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; }
  .try-it h3 { font-size: 0.85rem; font-weight: 800; margin-bottom: 1.2rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; }
  .field-group { margin-bottom: 1rem; }
  .field-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; }
  .field-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.9rem; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    outline: none; transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--saffron); }
  .send-btn {
    background: var(--saffron); color: white; border: none;
    padding: 0.7rem 1.8rem; border-radius: 6px; cursor: pointer;
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
    font-size: 0.88rem; transition: opacity 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn.loading { opacity: 0.6; cursor: not-allowed; }

  .response-box { margin-top: 1.5rem; }
  .response-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 0.75rem; font-size: 0.8rem; font-family: 'DM Mono', monospace;
  }
  .status-200 { color: var(--green); font-weight: 700; }
  .status-400 { color: var(--orange); font-weight: 700; }
  .status-404 { color: var(--yellow); font-weight: 700; }
  .response-time { color: var(--muted); }
  .code-block {
    background: #010409; border: 1px solid var(--border);
    border-radius: 8px; padding: 1.2rem; overflow-x: auto;
    font-family: 'DM Mono', monospace; font-size: 0.82rem;
    line-height: 1.7; white-space: pre;
  }
  .json-key { color: var(--blue); }
  .json-str { color: var(--green); }
  .json-num { color: var(--orange); }
  .json-bool { color: var(--purple); }
  .json-null { color: var(--muted); }
</style>
</head>
<body>

<header>
  <a href="../index.html" class="back">← Portfolio</a>
  <div class="tool-logo">API<span>.</span>Explorer</div>
  <span class="badge-live">● Live Demo</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Users</div>
      <button class="endpoint-btn active" onclick="loadEndpoint('list-users')">
        <span class="method-badge get">GET</span>/users
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('get-user')">
        <span class="method-badge get">GET</span>/users/{id}
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('create-user')">
        <span class="method-badge post">POST</span>/users
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('update-user')">
        <span class="method-badge patch">PATCH</span>/users/{id}
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('delete-user')">
        <span class="method-badge delete">DELETE</span>/users/{id}
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Documents</div>
      <button class="endpoint-btn" onclick="loadEndpoint('list-docs')">
        <span class="method-badge get">GET</span>/docs
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('create-doc')">
        <span class="method-badge post">POST</span>/docs
      </button>
      <button class="endpoint-btn" onclick="loadEndpoint('publish-doc')">
        <span class="method-badge put">PUT</span>/docs/{id}/publish
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Search</div>
      <button class="endpoint-btn" onclick="loadEndpoint('search')">
        <span class="method-badge get">GET</span>/search
      </button>
    </div>
  </div>

  <div class="main" id="mainPanel">
    <!-- filled by JS -->
  </div>
</div>

<script>
const endpoints = {
  'list-users': {
    title: 'List Users', method: 'GET', path: '/v1/users',
    desc: 'Returns a paginated list of all users in the system. Supports filtering by role and status.',
    params: [
      { name: 'limit', type: 'integer', required: false, desc: 'Number of results per page. Default: 20, Max: 100.' },
      { name: 'page', type: 'integer', required: false, desc: 'Page number for pagination. Default: 1.' },
      { name: 'role', type: 'string', required: false, desc: 'Filter by role. Values: admin, writer, viewer.' },
      { name: 'status', type: 'string', required: false, desc: 'Filter by account status. Values: active, inactive.' },
    ],
    fields: [
      { name: 'limit', placeholder: '20', label: 'limit (query)' },
      { name: 'role', placeholder: 'e.g. writer', label: 'role (query)' },
    ],
    mockFn: (f) => ({
      data: [
        { id: 'usr_01', name: 'Anubhuti Khare', role: f.role || 'writer', email: 'khareanu1612@gmail.com', status: 'active', created_at: '2024-11-01T09:00:00Z' },
        { id: 'usr_02', name: 'Rosa Cat', role: 'chaos_agent', email: 'rosa@localhost', status: 'active', created_at: '2024-01-01T00:00:00Z' },
        { id: 'usr_03', name: 'Lily Cat', role: 'chaos_agent', email: 'lily@localhost', status: 'active', created_at: '2024-01-01T00:00:00Z' },
      ],
      meta: { total: 3, page: 1, limit: parseInt(f.limit) || 20 }
    })
  },
  'get-user': {
    title: 'Get User', method: 'GET', path: '/v1/users/{id}',
    desc: 'Retrieve a single user by their unique ID.',
    params: [
      { name: 'id', type: 'string', required: true, desc: 'Unique identifier for the user.' },
    ],
    fields: [
      { name: 'id', placeholder: 'usr_01', label: 'id (path)' },
    ],
    mockFn: (f) => {
      if (!f.id || f.id === '') return { error: 'User ID is required', status: 400 };
      if (f.id !== 'usr_01' && f.id !== 'usr_02') return { error: 'User not found', status: 404 };
      return { id: f.id, name: f.id === 'usr_01' ? 'Anubhuti Khare' : 'Rosa Cat', role: 'writer', email: 'khareanu1612@gmail.com', status: 'active', created_at: '2024-11-01T09:00:00Z' };
    }
  },
  'create-user': {
    title: 'Create User', method: 'POST', path: '/v1/users',
    desc: 'Create a new user account. Returns the created user object with a generated ID.',
    params: [
      { name: 'name', type: 'string', required: true, desc: 'Full name of the user.' },
      { name: 'email', type: 'string', required: true, desc: 'Valid email address. Must be unique.' },
      { name: 'role', type: 'string', required: true, desc: 'User role. Values: admin, writer, viewer.' },
    ],
    fields: [
      { name: 'name', placeholder: 'Anubhuti Khare', label: 'name (body)' },
      { name: 'email', placeholder: 'hello@example.com', label: 'email (body)' },
      { name: 'role', placeholder: 'writer', label: 'role (body)' },
    ],
    mockFn: (f) => {
      if (!f.name || !f.email) return { error: 'name and email are required', status: 400 };
      return { id: 'usr_' + Math.random().toString(36).slice(2,6), name: f.name, email: f.email, role: f.role || 'viewer', status: 'active', created_at: new Date().toISOString() };
    }
  },
  'update-user': {
    title: 'Update User', method: 'PATCH', path: '/v1/users/{id}',
    desc: 'Partially update a user. Only provided fields will be updated.',
    params: [
      { name: 'id', type: 'string', required: true, desc: 'Unique identifier for the user.' },
      { name: 'name', type: 'string', required: false, desc: 'Updated full name.' },
      { name: 'role', type: 'string', required: false, desc: 'Updated role.' },
    ],
    fields: [
      { name: 'id', placeholder: 'usr_01', label: 'id (path)' },
      { name: 'name', placeholder: 'New Name', label: 'name (body)' },
      { name: 'role', placeholder: 'admin', label: 'role (body)' },
    ],
    mockFn: (f) => ({ id: f.id || 'usr_01', name: f.name || 'Anubhuti Khare', role: f.role || 'writer', status: 'active', updated_at: new Date().toISOString() })
  },
  'delete-user': {
    title: 'Delete User', method: 'DELETE', path: '/v1/users/{id}',
    desc: 'Permanently delete a user by ID. This action cannot be undone.',
    params: [{ name: 'id', type: 'string', required: true, desc: 'Unique identifier for the user.' }],
    fields: [{ name: 'id', placeholder: 'usr_01', label: 'id (path)' }],
    mockFn: (f) => ({ deleted: true, id: f.id || 'usr_01', deleted_at: new Date().toISOString() })
  },
  'list-docs': {
    title: 'List Documents', method: 'GET', path: '/v1/docs',
    desc: 'Returns all documents accessible to the authenticated user.',
    params: [
      { name: 'status', type: 'string', required: false, desc: 'Filter by publish status: draft, published, archived.' },
      { name: 'author_id', type: 'string', required: false, desc: 'Filter documents by author.' },
    ],
    fields: [
      { name: 'status', placeholder: 'published', label: 'status (query)' },
    ],
    mockFn: (f) => ({
      data: [
        { id: 'doc_01', title: 'Getting Started Guide', status: f.status || 'published', author: 'Anubhuti Khare', updated_at: '2025-03-01T10:00:00Z' },
        { id: 'doc_02', title: 'API Reference', status: f.status || 'published', author: 'Anubhuti Khare', updated_at: '2025-03-15T14:00:00Z' },
        { id: 'doc_03', title: 'Release Notes v2.4', status: 'draft', author: 'Anubhuti Khare', updated_at: '2025-03-20T09:30:00Z' },
      ],
      meta: { total: 3 }
    })
  },
  'create-doc': {
    title: 'Create Document', method: 'POST', path: '/v1/docs',
    desc: 'Create a new documentation article. Returns the article object with a draft status.',
    params: [
      { name: 'title', type: 'string', required: true, desc: 'Document title.' },
      { name: 'content', type: 'string', required: false, desc: 'Markdown content body.' },
      { name: 'category', type: 'string', required: false, desc: 'Category slug for organizing content.' },
    ],
    fields: [
      { name: 'title', placeholder: 'My New Document', label: 'title (body)' },
      { name: 'category', placeholder: 'getting-started', label: 'category (body)' },
    ],
    mockFn: (f) => {
      if (!f.title) return { error: 'title is required', status: 400 };
      return { id: 'doc_' + Math.random().toString(36).slice(2,6), title: f.title, category: f.category || 'uncategorized', status: 'draft', created_at: new Date().toISOString() };
    }
  },
  'publish-doc': {
    title: 'Publish Document', method: 'PUT', path: '/v1/docs/{id}/publish',
    desc: 'Publish a document, making it publicly accessible. Returns the updated document.',
    params: [{ name: 'id', type: 'string', required: true, desc: 'Document ID to publish.' }],
    fields: [{ name: 'id', placeholder: 'doc_01', label: 'id (path)' }],
    mockFn: (f) => ({ id: f.id || 'doc_01', status: 'published', published_at: new Date().toISOString() })
  },
  'search': {
    title: 'Search', method: 'GET', path: '/v1/search',
    desc: 'Full-text search across all documentation content. Returns ranked results.',
    params: [
      { name: 'q', type: 'string', required: true, desc: 'Search query string.' },
      { name: 'type', type: 'string', required: false, desc: 'Filter by type: doc, user, category.' },
    ],
    fields: [
      { name: 'q', placeholder: 'getting started', label: 'q (query)' },
      { name: 'type', placeholder: 'doc', label: 'type (query)' },
    ],
    mockFn: (f) => {
      if (!f.q) return { error: 'q is required', status: 400 };
      return {
        query: f.q, total: 2, took_ms: Math.floor(Math.random() * 30 + 5),
        results: [
          { id: 'doc_01', title: `Getting Started with ${f.q}`, excerpt: `Learn how to use ${f.q} in your workflow...`, score: 0.98 },
          { id: 'doc_02', title: `${f.q} Best Practices`, excerpt: `Best practices for ${f.q} in production environments...`, score: 0.74 },
        ]
      };
    }
  },
};

function syntaxHL(val) {
  return JSON.stringify(val, null, 2)
    .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
    .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
    .replace(/: null/g, ': <span class="json-null">null</span>');
}

function getMethodClass(m) {
  return m.toLowerCase();
}

let currentId = 'list-users';

function loadEndpoint(id) {
  currentId = id;
  document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render(id);
}

function render(id, activeTab) {
  const ep = endpoints[id];
  const tab = activeTab || 'params';
  const mc = getMethodClass(ep.method);

  const paramsHtml = ep.params.map(p => `
    <tr>
      <td><span class="param-name">${p.name}</span></td>
      <td><span class="param-type">${p.type}</span></td>
      <td><span class="param-required">${p.required ? 'required' : 'optional'}</span></td>
      <td class="param-desc">${p.desc}</td>
    </tr>
  `).join('');

  const fieldsHtml = ep.fields.map(f => `
    <div class="field-group">
      <div class="field-label">${f.label}</div>
      <input class="field-input" id="field-${f.name}" placeholder="${f.placeholder}" />
    </div>
  `).join('');

  document.getElementById('mainPanel').innerHTML = `
    <div class="endpoint-header">
      <div class="endpoint-title">${ep.title}</div>
      <div class="endpoint-desc">${ep.desc}</div>
      <div class="endpoint-url">
        <span class="method-badge ${mc}">${ep.method}</span>
        <span class="url-path">https://api.example.com${ep.path}</span>
      </div>
    </div>

    <div class="tabs-row">
      <button class="tab ${tab === 'params' ? 'active' : ''}" onclick="switchTab('params', '${id}')">Parameters</button>
      <button class="tab ${tab === 'try' ? 'active' : ''}" onclick="switchTab('try', '${id}')">Try It</button>
    </div>

    <div class="tab-content ${tab === 'params' ? 'active' : ''}" id="tc-params">
      <table class="params-table">
        <thead><tr><th>Name</th><th>Type</th><th>Required</th><th>Description</th></tr></thead>
        <tbody>${paramsHtml}</tbody>
      </table>
    </div>

    <div class="tab-content ${tab === 'try' ? 'active' : ''}" id="tc-try">
      <div class="try-it">
        <h3>Try this endpoint</h3>
        ${fieldsHtml}
        <button class="send-btn" id="sendBtn" onclick="sendRequest('${id}')">▶ Send Request</button>
        <div class="response-box" id="responseBox" style="display:none"></div>
      </div>
    </div>
  `;
}

function switchTab(tab, id) {
  render(id || currentId, tab);
}

function sendRequest(id) {
  const ep = endpoints[id];
  const btn = document.getElementById('sendBtn');
  btn.classList.add('loading');
  btn.textContent = '⟳ Sending...';

  const fields = {};
  ep.fields.forEach(f => {
    const el = document.getElementById('field-' + f.name);
    if (el) fields[f.name] = el.value;
  });

  const delay = Math.floor(Math.random() * 300 + 150);

  setTimeout(() => {
    const result = ep.mockFn(fields);
    const status = result.status || 200;
    const statusClass = status === 200 ? 'status-200' : status === 400 ? 'status-400' : 'status-404';
    const statusText = status === 200 ? '200 OK' : status === 400 ? '400 Bad Request' : '404 Not Found';
    const display = { ...result };
    delete display.status;

    document.getElementById('responseBox').style.display = 'block';
    document.getElementById('responseBox').innerHTML = `
      <div class="response-header">
        <span class="${statusClass}">${statusText}</span>
        <span class="response-time">${delay}ms</span>
      </div>
      <div class="code-block">${syntaxHL(display)}</div>
    `;
    btn.classList.remove('loading');
    btn.innerHTML = '▶ Send Request';
  }, delay);
}

render('list-users');
</script>
</body>
</html>
